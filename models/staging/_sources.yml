version: 2

# -----------------------------------------------------------------------------
# Source: NYC TLC Yellow Taxi trip records (Jan–Mar 2026)
# -----------------------------------------------------------------------------
# Files are read directly from the local `resources/` directory via DuckDB's
# read_parquet() / read_csv_auto(). The path is templated through a project
# var (see dbt_project.yml: `parquet_glob`) so a single override moves us
# from local files to s3:// or @stage references without touching SQL.
#
# In Snowflake, the equivalent of `external_location: read_parquet(...)` is
# an external stage + a view (or COPY INTO a raw table). See PLAN.md.
# -----------------------------------------------------------------------------

sources:
  - name: tlc
    description: >
      NYC Taxi & Limousine Commission trip-record data. Yellow-taxi only,
      Jan–Mar 2026. Schema follows the official TLC data dictionary
      (resources/data_dictionary_trip_records_yellow.pdf).
    meta:
      owner: "@analytics-eng"
      source_system: "NYC TLC public dataset"
      refresh_cadence: "Monthly (TLC publishes ~2 months in arrears)"
    loaded_at_field: tpep_pickup_datetime
    freshness:
      warn_after: { count: 90, period: day }
      error_after: { count: 180, period: day }

    tables:
      - name: yellow_trips_raw
        identifier: "read_parquet('{{ var('parquet_glob') }}', union_by_name=true, filename=true)"
        description: >
          Raw yellow-taxi trip records, unioned across all monthly parquet
          files matched by `parquet_glob`. `filename=true` exposes the
          source file path as a column so we can trace any row back to its
          monthly partition; `union_by_name=true` defends against schema
          drift if TLC adds/removes a column in a future month.
        columns:
          - name: VendorID
            description: "TPEP provider that supplied the record. 1 = Creative Mobile Technologies, 2 = Verifone, 6 = Myle, 7 = Helix."
          - name: tpep_pickup_datetime
            description: "Meter engaged timestamp (local NYC time)."
          - name: tpep_dropoff_datetime
            description: "Meter disengaged timestamp (local NYC time)."
          - name: passenger_count
            description: "Driver-entered passenger count. Self-reported; nulls and zeros occur."
          - name: trip_distance
            description: "Elapsed trip distance in miles, as reported by the taximeter."
          - name: RatecodeID
            description: "Rate code in effect at trip end. 1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated, 6=Group ride, 99=Unknown."
          - name: store_and_fwd_flag
            description: >
              'Y' = trip record was held in vehicle memory before being sent to
              the vendor because the vehicle had no connection to the server,
              'N' otherwise. Y rows are higher risk for duplicates / out-of-order timestamps.
          - name: PULocationID
            description: "TLC Taxi Zone of pickup. FK to taxi_zone_lookup.LocationID."
          - name: DOLocationID
            description: "TLC Taxi Zone of drop-off. FK to taxi_zone_lookup.LocationID."
          - name: payment_type
            description: >
              Numeric code: 0=Flex Fare, 1=Credit card, 2=Cash, 3=No charge,
              4=Dispute, 5=Unknown, 6=Voided trip. tip_amount is only populated
              for code 1 (credit card) — cash tips are NOT captured.
          - name: fare_amount
            description: "Time-and-distance fare calculated by the meter."
          - name: extra
            description: "Miscellaneous extras and surcharges (rush-hour, overnight)."
          - name: mta_tax
            description: "$0.50 MTA tax automatically triggered based on metered rate."
          - name: tip_amount
            description: >
              Tip amount. Populated automatically for credit-card tips ONLY.
              Cash tips appear as 0.00 — they are not zero in reality, they are
              unobserved. Any aggregate over this column must caveat that.
          - name: tolls_amount
            description: "Total tolls paid during the trip."
          - name: improvement_surcharge
            description: "$0.30 surcharge assessed on hailed trips at flag drop."
          - name: total_amount
            description: "Total charged to passenger. Does NOT include cash tips."
          - name: congestion_surcharge
            description: "NY State congestion surcharge collected in-zone."
          - name: Airport_fee
            description: "$1.25 for pickups at LaGuardia and JFK Airports."
          - name: cbd_congestion_fee
            description: "Manhattan Central Business District congestion-pricing fee (added 2025)."
          - name: filename
            description: "Derived: source parquet file path (added by read_parquet filename=true). Used for partition lineage and incremental loading."

  - name: ref
    description: "Reference / lookup data shipped alongside the trip records."
    tables:
      - name: taxi_zone_lookup
        identifier: "read_csv_auto('{{ var('zone_lookup_path') }}')"
        description: >
          TLC Taxi Zone shapefile lookup — 265 zones across the five boroughs
          plus EWR (Newark Airport). One row per LocationID.
        columns:
          - name: LocationID
            description: "Surrogate ID for a TLC Taxi Zone. PK."
            data_tests:
              - unique
              - not_null
          - name: Borough
            description: "NYC borough name (Manhattan, Brooklyn, Queens, Bronx, Staten Island, EWR, Unknown)."
            data_tests:
              - not_null
          - name: Zone
            description: "Human-readable neighborhood / zone name."
          - name: service_zone
            description: "Yellow/Green/Boro/Airports service designation used by TLC."
