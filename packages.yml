# Direct dependencies only. dbt-expectations pulls calogica/dbt_date
# (>=0.9.0,<1.0.0) transitively; it appears in dbt_packages/ and is pinned
# in package-lock.yml (resolved to 0.10.1). We do NOT use dbt_date directly
# (dim_date uses dbt_utils.date_spine) and deliberately do NOT declare it
# here — pinning a transitive dep risks conflicting with the range
# dbt-expectations requires. The lockfile already guarantees reproducibility.
packages:
  - git: "https://github.com/dbt-labs/dbt-utils.git"
    revision: 1.3.0
  - git: "https://github.com/calogica/dbt-expectations.git"
    revision: 0.10.4
